# Copy to vault.yml and encrypt: ansible-vault encrypt vault.yml

# ---- Proxmox GUI users ----
vault_pve_admin_users:
  - name: "admin"
    password: "changeme"
    role: "Administrator"
  - name: "devops"
    password: "changeme"
    role: "Administrator"

# ---- Alerts ----
vault_alert_email: "you@gmail.com"

# ---- Telegram ----
# 1. Create bot: https://t.me/BotFather → /newbot
# 2. Get chat_id: send message to bot, then visit
#    https://api.telegram.org/bot<TOKEN>/getUpdates
vault_telegram_bot_token: "123456789:ABCdefGHIjklMNOpqrsTUVwxyz"
vault_telegram_chat_id: "123456789"

# ---- Network ----
vault_public_subnet: "198.51.100.0/29" # Your additional subnet
vault_ansible_host: "192.0.2.1" # Server IP address

# ---- SMTP (Gmail App Password) ----
# Generate at: https://myaccount.google.com/apppasswords
vault_smtp_host: "smtp.gmail.com"
vault_smtp_port: "587"
vault_smtp_user: "<your-mail-box>@gmail.com"
vault_smtp_password: "xxxx xxxx xxxx xxxx"
